    <style>
        .icon {
            width: 1em;
            height: 1em;
            vertical-align: -.8em;
            bottom: 3em;
            fill: currentColor;
            overflow: hidden;
            transition: 0.5s;
            z-index: 9;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }

        body,
        ul,
        p {
            padding: 0;
            margin: 0;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: #000;
        }

        .bnav {
            position: fixed;
            /* 固定定位 */
            left: 0;
            bottom: 0;
            background-color: rgb(246, 246, 246);
            width: 100%;
            z-index: 9;
            /* 用来设定固定定位的z轴 */
        }

        body {
            margin-bottom: 50px;
            /* 和固定定位一起用 */
        }

        .bnav>ul {
            display: flex;
            /* 要给到效果的父元素 */
        }

        .bnav li {
            width: 20%;
            text-align: center;
        }

        .icon {
            font-size: 36px;
            margin: -.2em 0;
        }

        .bnav p {
            font-size: 14px;
            color: #000;
            line-height: 2em;
            letter-spacing: 1.5px;
            /* 字体间距 */
        }

        .t4 {
            text-indent: .2em
        }

        .t2 {
            text-indent: .05em
        }

        .t3 {
            text-indent: .02em
        }


        .bnav ul li.active a .c {
            position: fixed;
            font-size: 30px;
            transform: scale(1);
            justify-content: center;
            align-items: center;
            margin-bottom: -2em;
            margin-left: -1.01em;
        }

        .bnav ul li .c {
            position: fixed;
            transform: scale(0);
            margin-bottom: -3em;
            margin-left: -1.01em;
        }

        .bnav ul li.active a .nc {
            font-size: 30px;
            /* 图标上移 */
            color: red;
            transform: scale(0);
            transition: 0.35s;
        }

        .bnav ul li a .text {
            /* 绝对定位 */
            position: flexed;
            font-size: 12px;
            bottom: 0px;
            /* 设置过渡 */
            transition: 0.5s;
            /* 默认隐藏 */
            transform: scale(0);
        }

        .bnav ul li.active a .text {
            /* 选中,文字显示 */
            transform: scale(1);
            margin: 1px;
        }
        .contral ul li.active a  {
            font-weight: bolder;
            transition: .5s;
        }
        /* 优先级最高才能初始就显示 */
        .syTabtext .syItem .show{
            font-weight: bolder;
            
            transition: 0.5s;
        }
    </style>
    <link rel="stylesheet" href="./xdhqh.css">

    <script>
        let items = document.querySelectorAll(".item");
        function setActive() {
            items.forEach((item) => {
                item.classList.remove("active");
            })
            this.classList.add("active");
        }
        items.forEach((item) => {
            item.addEventListener("click", setActive);
        })
        //下导航遍历
        var contral=document.getElementsByClassName("contral")[0];
        var tabcontent=contral.querySelector(".tab-content");
        var fy=tabcontent.querySelector(".fy");
        var syTabtext=fy.querySelector(".syTabtext")
        var syItem=fy.querySelectorAll("li")

        for(var i=0;i<syItem.length;i++){
            syItem[i].index=i;//index 是自定义属性
            syItem[i].onclick=function(){
                for(var j=0;j<syItem.length;j++)[
                    syItem[j].classList.remove("show")
                ]
                syItem[this.index].classList.add("show")
            }

        }
        //首页字体循环
    </script>
