<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0503 康智泓</title>
<style>
    body{
        padding: 0;
        margin: 0;
        font-size: 40px;
    }
    #header{
        min-width: 1200px;/* min最小宽度 */
        background-color: red;
        height: 80px;
        position: relative;/* 绝对定位参照物 相对定位 */
    }
    #logo{
        position: absolute;/* 绝对定位命令 */
        top: 2px;
        padding: 8px;
        left: 100px;
    
    }
    #login{
        position: absolute;
        right: 100px;
        bottom: 10px;
        padding: 8px;
    }
    #wrap{
        width: 1200px;
        margin: 0 auto;
    }
    #nav{
        height: 60px;
        background-color: rgb(57, 255, 22);
    }
    #main{
        width: 400px;
        height: 3000px;
        background-color: rgb(72, 0, 255);
        float: left;
    }
    #name{
        width: 400px;
        height: 3000px;
        background-color: bisque;
        float: left;
    }
    #side{
        width: 400px;
        height: 3000px;
        background-color: aliceblue;
        float: left;
    }
    #ad{
        height: 60px;
        background-color: blueviolet;
        clear: both;
    }
    #footer{
        background-color: antiquewhite;
        min-width: 1200px;
        height: 100px                                     ;
    }
</style>
</head>
<body>
    <div id="header">
        <div id="logo">logo</div>
        <div id="login">login</div>
    </div>
    <div id="wrap">
        <div id="nav">导航</div>
        <div id="main">主要内容</div>
        <div id="name">0503 康智泓</div>
        <div id="side">侧边栏</div>
        <div id="ad">浮动之后的内容</div>
    </div>

    <div id="footer">版权信息</div>
</body>
</html>
